<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GMGN Wallet PnL Analyzer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236571ff'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='800'>G</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08090c; --surface: #0f1117; --card: #141620; --raised: #1a1e2e;
  --border: #1c2035; --borderHi: #282d45;
  --text: #e2e4ed; --dim: #6e7490; --muted: #3d4260;
  --green: #00e396; --greenF: rgba(0,227,150,0.07); --greenS: #00b377;
  --red: #ff4560; --redF: rgba(255,69,96,0.07); --redS: #cc3750;
  --blue: #6571ff; --blueF: rgba(101,113,255,0.08); --blueH: #8b93ff;
  --amber: #ffb547; --amberF: rgba(255,181,71,0.08);
}
html, body, #root { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--borderHi); border-radius: 4px; }
input, button { font-family: inherit; }
input:focus { outline: 1px solid var(--blue); outline-offset: 1px; }
a { color: var(--blueH); text-decoration: none; }
.mono { font-family: 'JetBrains Mono', monospace; }
.sortable { cursor: pointer; user-select: none; transition: color 0.15s; }
.sortable:hover { color: var(--blueH) !important; }
.row:hover { background: var(--card) !important; }

/* Mobile */
@media (max-width: 768px) {
  .header-inner { flex-direction: column !important; align-items: stretch !important; }
  .header-controls { flex-wrap: wrap !important; }
  .header-input { width: 100% !important; }
  .overview-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .analysis-grid { grid-template-columns: 1fr !important; }
  .filter-bar { flex-direction: column !important; align-items: stretch !important; }
  .metric-value { font-size: 16px !important; }
}
@media (max-width: 480px) {
  .overview-grid { grid-template-columns: 1fr !important; }
  main { padding: 12px !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ── API layer ──────────────────────────────────────────
const API_BASE = window.location.origin;

async function apiFetch(path, params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${API_BASE}${path}?${qs}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchHoldings(wallet, opts = {}) {
  return apiFetch("/api/wallet/holdings", {
    chain: "sol", wallet_address: wallet, hide_closed: "false", hide_airdrop: "false", limit: "50", ...opts,
  });
}

async function fetchActivity(wallet, opts = {}) {
  return apiFetch("/api/wallet/activity", { chain: "sol", wallet_address: wallet, limit: "50", ...opts });
}

async function fetchStats(wallet, period) {
  return apiFetch("/api/wallet/stats", { chain: "sol", wallet_address: wallet, period });
}

// ── Mock data (used when API key not configured) ───────
function seed(s) { let h = s; return () => { h = (h * 16807) % 2147483647; return (h - 1) / 2147483646; }; }
const rng = seed(42);

const MOCK_TOKENS = [
  { symbol: "BONK", address: "DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" },
  { symbol: "WIF", address: "EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm" },
  { symbol: "POPCAT", address: "7GCihgDB8fe6KNjn2MYtkzZcRjQy3t9GHdC8uHYmW2hr" },
  { symbol: "MYRO", address: "HhJpBhRRn4g56VsyLuT8DL5Bv31HkXqsrahTTUCZeZg4" },
  { symbol: "MEW", address: "MEW1gQWJ3nEXg2qgERiKu7FAFj79PHvQVREQUzScPP5" },
  { symbol: "SLERF", address: "7BgBvyjrZX1YKz4oh9mjb8ZScatkkwb8DzFx7LoiVkM3" },
  { symbol: "BOME", address: "ukHH6c7mMyiWCf1b9pnWe25TSpkDDt3H5pQZgZ74J82" },
  { symbol: "TRUMP", address: "6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN" },
  { symbol: "GIGA", address: "63LfDmNb3MQ8mw9MtZ2To9bEA2M71kZUUGq5tiJxcqj9" },
  { symbol: "MOODENG", address: "ED5nyyWEzpPPiWimP8vYm7sD7TD3LAt3Q3gRTWHzPJBY" },
  { symbol: "PNUT", address: "2qEHjDLDLbuBgRYvsxhc5D6uDWAivNFZGan56P1tpump" },
  { symbol: "FARTCOIN", address: "9BB6NFEcjBCtnNLFko2FqVQBq8HHM13kCyYcdQbgpump" },
];

function buildMock() {
  const now = Date.now(); const txs = []; let id = 0;
  for (const token of MOCK_TOKENS) {
    const bc = Math.floor(rng() * 4) + 1;
    const sc = Math.max(0, Math.floor(rng() * (bc + 1)) - (rng() > 0.4 ? 0 : 1));
    const ep = rng() * 0.05 + 0.0001; const pm = 0.3 + rng() * 8; const cp = ep * pm;
    let tba = 0, tbc = 0, tsa = 0, tsi = 0;
    for (let i = 0; i < bc; i++) {
      const ts = now - (2 + rng() * 58) * 864e5;
      const bp = ep * (0.6 + rng() * 0.8); const amt = rng() * 8e5 + 5e4;
      const cost = amt * bp; const mc = Math.floor(rng() * 4e7 + 3e4);
      tba += amt; tbc += cost;
      txs.push({ id: id++, type: "Buy", token, mc, amount: amt, price: bp, totalUsd: cost, totalSol: cost / 148, timestamp: ts, currentPrice: cp });
    }
    for (let i = 0; i < sc; i++) {
      const ts = now - rng() * 25 * 864e5;
      const sp = ep * (1.2 + rng() * pm * 0.8); const amt = tba * (0.15 + rng() * 0.4) / Math.max(sc, 1);
      const inc = amt * sp; const mc = Math.floor(rng() * 7e7 + 2e5);
      tsa += amt; tsi += inc;
      txs.push({ id: id++, type: "Sell", token, mc, amount: amt, price: sp, totalUsd: inc, totalSol: inc / 148, timestamp: ts, currentPrice: cp });
    }
    const uPct = tba > 0 ? (Math.max(0, tba - tsa) / tba) * 100 : 0;
    const acb = tba > 0 ? tbc / tba : 0;
    for (const tx of txs) {
      if (tx.token.address !== token.address || tx.unsoldPct !== undefined) continue;
      tx.unsoldPct = uPct;
      if (tx.type === "Buy") {
        tx.txProfit = tx.amount * cp - tx.totalUsd;
        tx.txRoi = tx.totalUsd > 0 ? (tx.txProfit / tx.totalUsd) * 100 : 0;
        tx.txUnrealizedRoi = tx.txRoi;
      } else {
        const cb = tx.amount * acb;
        tx.txProfit = tx.totalUsd - cb;
        tx.txRoi = cb > 0 ? (tx.txProfit / cb) * 100 : 0;
        tx.txUnrealizedRoi = tx.txRoi;
      }
    }
  }
  const ctr = {}; const s = [...txs].sort((a, b) => a.timestamp - b.timestamp);
  for (const tx of s) { const k = `${tx.token.address}_${tx.type}`; ctr[k] = (ctr[k] || 0) + 1; tx.seq = ctr[k]; }
  return txs.sort((a, b) => b.timestamp - a.timestamp);
}

const MOCK_TXS = buildMock();
const MOCK_OV = {
  "1D":  { roi: 12.4, uRoi: 18.7, buys: 5, sells: 2, avgDur: "2h 14m", cost: 1420, avgCost: 284, avgSold: 890, avgRealRoi: 42.3, vol: 4200, dist: [0,1,3,1,0] },
  "7D":  { roi: 34.2, uRoi: 52.1, buys: 18, sells: 9, avgDur: "1d 6h", cost: 8940, avgCost: 496, avgSold: 720, avgRealRoi: 67.8, vol: 21400, dist: [2,3,7,4,2] },
  "30D": { roi: 87.5, uRoi: 124.3, buys: 64, sells: 38, avgDur: "3d 12h", cost: 42300, avgCost: 661, avgSold: 1120, avgRealRoi: 89.2, vol: 98700, dist: [5,8,22,14,15] },
  "60D": { roi: 142.1, uRoi: 198.6, buys: 112, sells: 71, avgDur: "5d 8h", cost: 89400, avgCost: 798, avgSold: 1340, avgRealRoi: 112.4, vol: 214000, dist: [9,14,38,28,23] },
  "All": { roi: 267.8, uRoi: 312.4, buys: 248, sells: 164, avgDur: "8d 3h", cost: 198000, avgCost: 798, avgSold: 1280, avgRealRoi: 156.7, vol: 520000, dist: [18,28,72,64,66] },
};

// ── Format helpers ─────────────────────────────────────
const fUsd = v => { const a = Math.abs(v), s = v < 0 ? "-" : ""; if (a >= 1e6) return s+"$"+(a/1e6).toFixed(2)+"M"; if (a >= 1e3) return s+"$"+(a/1e3).toFixed(2)+"K"; return s+"$"+a.toFixed(2); };
const fSol = v => v.toFixed(3) + " SOL";
const fNum = v => { const a = Math.abs(v); if (a >= 1e6) return (v/1e6).toFixed(2)+"M"; if (a >= 1e3) return (v/1e3).toFixed(1)+"K"; return v.toFixed(0); };
const fPct = v => (v >= 0 ? "+" : "") + v.toFixed(1) + "%";
const fMc = v => { if (v >= 1e9) return "$"+(v/1e9).toFixed(2)+"B"; if (v >= 1e6) return "$"+(v/1e6).toFixed(2)+"M"; if (v >= 1e3) return "$"+(v/1e3).toFixed(0)+"K"; return "$"+v.toFixed(0); };
const fAge = ts => { const d = Date.now() - ts, m = Math.floor(d/6e4); if (m < 60) return m+"m ago"; const h = Math.floor(m/60); if (h < 24) return h+"h "+m%60+"m"; const dy = Math.floor(h/24); return dy+"d "+h%24+"h"; };

const DIST_LABELS = [">500%","200%–500%","0%–200%","-50%–0%","<-50%"];
const DIST_COLORS = ["var(--green)","var(--greenS)","var(--amber)","var(--redS)","var(--red)"];

// ── App ────────────────────────────────────────────────
function App() {
  const [wallet, setWallet] = useState("");
  const [walletInput, setWalletInput] = useState("");
  const [unit, setUnit] = useState("USD");
  const [period, setPeriod] = useState("30D");
  const [filter, setFilter] = useState("All");
  const [mcMin, setMcMin] = useState("");
  const [mcMax, setMcMax] = useState("");
  const [sortCol, setSortCol] = useState("timestamp");
  const [sortAsc, setSortAsc] = useState(false);
  const [txs, setTxs] = useState(MOCK_TXS);
  const [overview, setOverview] = useState(MOCK_OV);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [isLive, setIsLive] = useState(false);

  // Check if API is configured
  useEffect(() => {
    fetch("/api/health").then(r => r.json()).then(d => {
      if (d.hasKey) setIsLive(true);
    }).catch(() => {});
  }, []);

  const analyze = useCallback(async () => {
    const addr = walletInput.trim();
    if (!addr) return;
    setWallet(addr);
    if (!isLive) return; // Use mock data

    setLoading(true);
    setError(null);
    try {
      const [holdingsRes, activityRes, stats7Res, stats30Res] = await Promise.all([
        fetchHoldings(addr),
        fetchActivity(addr),
        fetchStats(addr, "7d"),
        fetchStats(addr, "30d"),
      ]);

      // Transform holdings + activity into tx rows
      const holdings = holdingsRes.data?.list || [];
      const activities = activityRes.data?.activities || [];
      const s7 = stats7Res.data || {};
      const s30 = stats30Res.data || {};

      // Build holdings lookup
      const holdingMap = {};
      for (const h of holdings) {
        holdingMap[h.token?.token_address] = h;
      }

      // Transform activities into table rows
      const ctr = {};
      const sorted = [...activities].sort((a, b) => a.timestamp - b.timestamp);
      const rows = [];
      for (const act of sorted) {
        const isBuy = act.event_type === "buy";
        const isSell = act.event_type === "sell";
        if (!isBuy && !isSell) continue;
        const type = isBuy ? "Buy" : "Sell";
        const addr = act.token?.address || "";
        const k = `${addr}_${type}`;
        ctr[k] = (ctr[k] || 0) + 1;
        const h = holdingMap[addr] || {};
        const totalSupply = parseFloat(h.token?.total_supply || "0");
        const price = parseFloat(act.price_usd || "0");
        const mc = totalSupply * price;
        const costUsd = parseFloat(act.cost_usd || "0");
        const tokenAmt = parseFloat(act.token_amount || "0");
        const unsoldPct = h.history_bought_amount > 0
          ? (parseFloat(h.balance || "0") / parseFloat(h.history_bought_amount)) * 100 : 0;
        const realProfit = parseFloat(h.realized_profit || "0");
        const realRoi = parseFloat(h.realized_profit_pnl || "0") * 100;
        const unRoi = parseFloat(h.unrealized_profit_pnl || "0") * 100;

        rows.push({
          id: rows.length,
          type,
          token: { symbol: act.token?.symbol || "???", address: addr },
          mc,
          amount: tokenAmt,
          totalUsd: costUsd,
          totalSol: costUsd / 148,
          timestamp: act.timestamp * 1000,
          seq: ctr[k],
          unsoldPct,
          txProfit: isSell ? costUsd - (tokenAmt * (parseFloat(h.history_bought_cost || "0") / Math.max(parseFloat(h.history_bought_amount || "1"), 1)))
                          : tokenAmt * parseFloat(h.token?.price || "0") - costUsd,
          txRoi: isSell ? realRoi : (costUsd > 0 ? ((tokenAmt * parseFloat(h.token?.price || "0") - costUsd) / costUsd) * 100 : 0),
          txUnrealizedRoi: unRoi,
        });
      }
      rows.sort((a, b) => b.timestamp - a.timestamp);
      setTxs(rows);

      // Build overview from stats
      const buildOv = (s, label) => {
        const ps = s.pnl_stat || {};
        const durSec = ps.avg_holding_period || 0;
        let durStr;
        if (durSec < 3600) durStr = Math.floor(durSec / 60) + "m";
        else if (durSec < 86400) durStr = Math.floor(durSec / 3600) + "h " + Math.floor((durSec % 3600) / 60) + "m";
        else durStr = Math.floor(durSec / 86400) + "d " + Math.floor((durSec % 86400) / 3600) + "h";
        return {
          roi: parseFloat(s.realized_profit_pnl || "0") * 100,
          uRoi: 0,
          buys: s.buy || 0,
          sells: s.sell || 0,
          avgDur: durStr,
          cost: parseFloat(s.bought_cost || "0"),
          avgCost: s.buy > 0 ? parseFloat(s.bought_cost || "0") / s.buy : 0,
          avgSold: s.sell > 0 ? parseFloat(s.sold_income || "0") / s.sell : 0,
          avgRealRoi: parseFloat(s.realized_profit_pnl || "0") * 100,
          vol: parseFloat(s.bought_cost || "0") + parseFloat(s.sold_income || "0"),
          dist: [ps.pnl_gt_5x_num || 0, ps.pnl_2x_5x_num || 0, ps.pnl_0x_2x_num || 0, ps.pnl_nd5_0x_num || 0, ps.pnl_lt_nd5_num || 0],
        };
      };
      setOverview(prev => ({
        ...prev,
        "7D": buildOv(s7, "7D"),
        "30D": buildOv(s30, "30D"),
      }));
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [walletInput, isLive]);

  const ov = overview[period];
  const distTotal = ov.dist.reduce((a, b) => a + b, 0);

  const SORT_FN = { timestamp: t => t.timestamp, profit: t => t.txProfit, roi: t => t.txRoi, unrealizedRoi: t => t.txUnrealizedRoi };

  const rows = useMemo(() => {
    let list = [...txs];
    if (filter === "Buys") list = list.filter(t => t.type === "Buy");
    else if (filter === "Sells") list = list.filter(t => t.type === "Sell");
    else if (filter === "Unique Buys") {
      const seen = new Set();
      list = list.filter(t => { if (t.type !== "Buy" || seen.has(t.token.address)) return false; seen.add(t.token.address); return true; });
    }
    if (mcMin !== "") list = list.filter(t => t.mc >= Number(mcMin));
    if (mcMax !== "") list = list.filter(t => t.mc <= Number(mcMax));
    const fn = SORT_FN[sortCol] || SORT_FN.timestamp;
    list.sort((a, b) => sortAsc ? fn(a) - fn(b) : fn(b) - fn(a));
    return list;
  }, [txs, filter, mcMin, mcMax, sortCol, sortAsc]);

  const toggleSort = col => {
    if (sortCol === col) setSortAsc(p => !p);
    else { setSortCol(col); setSortAsc(false); }
  };

  const Arrow = ({ col }) => {
    if (sortCol !== col) return React.createElement("span", { style: { opacity: 0.25, marginLeft: 3, fontSize: 9 } }, "⇅");
    return React.createElement("span", { style: { color: "var(--blue)", marginLeft: 3, fontSize: 9 } }, sortAsc ? "▲" : "▼");
  };

  const sortLabel = { timestamp: "Age", profit: "Profit", roi: "ROI", unrealizedRoi: "Unrealized ROI" }[sortCol];

  return (
    <div>
      {/* Header */}
      <header style={{ background: "var(--surface)", borderBottom: "1px solid var(--border)", padding: "14px 20px" }}>
        <div className="header-inner" style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
            <div style={{ width: 30, height: 30, borderRadius: 7, background: "linear-gradient(135deg, var(--blue), var(--green))", display: "grid", placeItems: "center", fontWeight: 800, fontSize: 13, color: "#fff" }}>G</div>
            <div>
              <h1 style={{ fontSize: 16, fontWeight: 700, letterSpacing: "-0.03em" }}>Wallet PnL Analyzer</h1>
              <span style={{ fontSize: 10, color: "var(--muted)" }}>GMGN Agent API</span>
            </div>
          </div>
          <div className="header-controls" style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {!isLive && (
              <span style={{ fontSize: 10, padding: "4px 10px", borderRadius: 5, background: "var(--amberF)", color: "var(--amber)", fontWeight: 600 }}>DEMO MODE</span>
            )}
            {isLive && (
              <span style={{ fontSize: 10, padding: "4px 10px", borderRadius: 5, background: "var(--greenF)", color: "var(--green)", fontWeight: 600 }}>● LIVE</span>
            )}
            <input className="header-input mono" value={walletInput} onChange={e => setWalletInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && analyze()}
              placeholder="Paste Solana wallet address…"
              style={{ width: 320, padding: "7px 12px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 7, color: "var(--text)", fontSize: 12 }} />
            <button onClick={analyze} disabled={loading}
              style={{ padding: "7px 18px", background: loading ? "var(--muted)" : "var(--blue)", color: "#fff", border: "none", borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: loading ? "wait" : "pointer" }}>
              {loading ? "Loading…" : "Analyze"}
            </button>
            <div style={{ display: "flex", background: "var(--card)", borderRadius: 6, border: "1px solid var(--border)", overflow: "hidden" }}>
              {["USD","SOL"].map(u => (
                <button key={u} onClick={() => setUnit(u)} style={{ padding: "6px 13px", border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer", background: unit === u ? "var(--blue)" : "transparent", color: unit === u ? "#fff" : "var(--dim)", transition: "all 0.15s" }}>{u}</button>
              ))}
            </div>
          </div>
        </div>
      </header>

      {error && (
        <div style={{ maxWidth: 1400, margin: "12px auto 0", padding: "0 20px" }}>
          <div style={{ background: "var(--redF)", border: "1px solid var(--redS)", borderRadius: 8, padding: "10px 14px", color: "var(--red)", fontSize: 13 }}>Error: {error}</div>
        </div>
      )}

      <main style={{ maxWidth: 1400, margin: "0 auto", padding: "18px 20px 48px" }}>

        {/* PnL Overview */}
        <section style={{ background: "var(--surface)", borderRadius: 12, border: "1px solid var(--border)", padding: "16px 18px", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <h2 style={{ fontSize: 14, fontWeight: 700 }}>PnL Overview</h2>
            <div style={{ display: "flex", background: "var(--bg)", borderRadius: 6, overflow: "hidden", border: "1px solid var(--border)" }}>
              {["1D","7D","30D","60D","All"].map(p => (
                <button key={p} onClick={() => setPeriod(p)} style={{ padding: "5px 14px", border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer", background: period === p ? "var(--blue)" : "transparent", color: period === p ? "#fff" : "var(--dim)", transition: "all 0.15s" }}>
                  {p === "All" ? "All Time" : p}
                </button>
              ))}
            </div>
          </div>

          <div className="overview-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(145px, 1fr))", gap: 10, marginBottom: 16 }}>
            {[
              { l: "Realized ROI", v: fPct(ov.roi), c: ov.roi >= 0 ? "var(--green)" : "var(--red)", bg: ov.roi >= 0 ? "var(--greenF)" : "var(--redF)" },
              { l: "Unrealized ROI", v: fPct(ov.uRoi), c: ov.uRoi >= 0 ? "var(--green)" : "var(--red)", bg: ov.uRoi >= 0 ? "var(--greenF)" : "var(--redF)" },
              { l: "Total Cost", v: fUsd(ov.cost), c: "var(--text)", bg: "var(--bg)" },
              { l: "Volume", v: fUsd(ov.vol), c: "var(--text)", bg: "var(--bg)" },
              { l: "Avg Realized ROI", v: fPct(ov.avgRealRoi), c: ov.avgRealRoi >= 0 ? "var(--green)" : "var(--red)", bg: ov.avgRealRoi >= 0 ? "var(--greenF)" : "var(--redF)" },
            ].map(m => (
              <div key={m.l} style={{ background: m.bg, borderRadius: 8, padding: "12px 14px", border: "1px solid var(--border)" }}>
                <div style={{ fontSize: 10, color: "var(--muted)", marginBottom: 5, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>{m.l}</div>
                <div className="mono metric-value" style={{ fontSize: 18, fontWeight: 700, color: m.c }}>{m.v}</div>
              </div>
            ))}
          </div>

          <div className="analysis-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div style={{ background: "var(--bg)", borderRadius: 8, padding: 14, border: "1px solid var(--border)" }}>
              <h3 style={{ fontSize: 12, fontWeight: 700, marginBottom: 10, color: "var(--dim)" }}>Analysis</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 12px" }}>
                {[
                  { l: "TXs: Buy / Sell", v: ov.buys + " / " + ov.sells },
                  { l: "Avg Duration", v: ov.avgDur },
                  { l: "Total Cost", v: fUsd(ov.cost) },
                  { l: "Avg Cost", v: fUsd(ov.avgCost) },
                  { l: "Avg Sold", v: fUsd(ov.avgSold) },
                  { l: "Avg Realized ROI", v: fPct(ov.avgRealRoi), c: ov.avgRealRoi >= 0 ? "var(--green)" : "var(--red)" },
                  { l: "Volume", v: fUsd(ov.vol) },
                ].map(s => (
                  <div key={s.l} style={{ padding: "5px 0", borderBottom: "1px solid var(--border)" }}>
                    <div style={{ fontSize: 10, color: "var(--muted)", marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>{s.l}</div>
                    <div className="mono" style={{ fontSize: 13, fontWeight: 600, color: s.c || "var(--text)" }}>{s.v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background: "var(--bg)", borderRadius: 8, padding: 14, border: "1px solid var(--border)" }}>
              <h3 style={{ fontSize: 12, fontWeight: 700, marginBottom: 10, color: "var(--dim)" }}>Distribution (Token ROI)</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {DIST_LABELS.map((label, i) => {
                  const pct = distTotal > 0 ? (ov.dist[i] / distTotal) * 100 : 0;
                  return (
                    <div key={label} style={{ display: "grid", gridTemplateColumns: "88px 1fr 26px 42px", alignItems: "center", gap: 7 }}>
                      <span className="mono" style={{ fontSize: 11, color: "var(--dim)", textAlign: "right", whiteSpace: "nowrap" }}>{label}</span>
                      <div style={{ height: 13, background: "var(--card)", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: Math.max(pct, 2) + "%", height: "100%", background: DIST_COLORS[i], borderRadius: 3, transition: "width 0.4s" }} />
                      </div>
                      <span className="mono" style={{ fontSize: 12, fontWeight: 600, textAlign: "right" }}>{ov.dist[i]}</span>
                      <span className="mono" style={{ fontSize: 10, color: "var(--muted)" }}>({pct.toFixed(0)}%)</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </section>

        {/* Transactions */}
        <section style={{ background: "var(--surface)", borderRadius: 12, border: "1px solid var(--border)", overflow: "hidden" }}>
          <div className="filter-bar" style={{ padding: "10px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
              <span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600, marginRight: 2 }}>FILTER</span>
              {["All","Buys","Sells","Unique Buys"].map(f => (
                <button key={f} onClick={() => setFilter(f)} style={{
                  padding: "5px 12px", borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: "pointer",
                  border: "1px solid " + (filter === f ? "var(--blue)" : "var(--border)"),
                  background: filter === f ? "var(--blueF)" : "transparent",
                  color: filter === f ? "var(--blueH)" : "var(--dim)", transition: "all 0.15s",
                }}>{f}</button>
              ))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600 }}>MC</span>
              <input className="mono" value={mcMin} onChange={e => setMcMin(e.target.value)} placeholder="Min"
                style={{ width: 72, padding: "5px 8px", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6, color: "var(--text)", fontSize: 11 }} />
              <span style={{ color: "var(--muted)" }}>—</span>
              <input className="mono" value={mcMax} onChange={e => setMcMax(e.target.value)} placeholder="Max"
                style={{ width: 72, padding: "5px 8px", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6, color: "var(--text)", fontSize: 11 }} />
            </div>
          </div>

          <div style={{ padding: "5px 16px", background: "var(--bg)", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 10, color: "var(--muted)", fontWeight: 600 }}>SORTING BY</span>
            <span style={{ fontSize: 11, color: "var(--blueH)", fontWeight: 700, textTransform: "uppercase" }}>{sortLabel}</span>
            <span style={{ fontSize: 10, color: "var(--dim)" }}>({sortAsc ? "asc" : "desc"})</span>
            <span style={{ fontSize: 10, color: "var(--muted)", marginLeft: "auto" }}>Click column headers to sort</span>
          </div>

          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", minWidth: 1020, fontSize: 13, borderCollapse: "collapse" }}>
              <thead>
                <tr>
                  {[
                    { l: "Tx Type", k: null }, { l: "Token", k: null }, { l: "MC", k: null },
                    { l: "Amount", k: null }, { l: "Unsold", k: null },
                    { l: unit === "USD" ? "Total USD" : "Total SOL", k: null },
                    { l: "Profit", k: "profit" }, { l: "ROI", k: "roi" }, { l: "Unrl. ROI", k: "unrealizedRoi" },
                    { l: "Age", k: "timestamp" },
                  ].map(h => (
                    <th key={h.l} className={h.k ? "sortable" : ""} onClick={h.k ? () => toggleSort(h.k) : undefined}
                      style={{
                        padding: "9px 12px", fontSize: 10, fontWeight: 700, background: "var(--bg)",
                        borderBottom: "2px solid " + (h.k && sortCol === h.k ? "var(--blue)" : "var(--border)"),
                        textTransform: "uppercase", letterSpacing: "0.07em", whiteSpace: "nowrap", textAlign: "left",
                        color: h.k && sortCol === h.k ? "var(--blueH)" : "var(--dim)",
                      }}>
                      {h.l}{h.k && <Arrow col={h.k} />}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(tx => {
                  const isBuy = tx.type === "Buy";
                  return (
                    <tr key={tx.id} className="row" style={{ borderBottom: "1px solid var(--border)", transition: "background 0.1s" }}>
                      <td style={{ padding: "8px 12px" }}>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px", borderRadius: 5, fontSize: 12, fontWeight: 700, background: isBuy ? "var(--greenF)" : "var(--redF)", color: isBuy ? "var(--green)" : "var(--red)" }}>
                          <span className="mono" style={{ fontSize: 10, fontWeight: 700, background: isBuy ? "rgba(0,227,150,0.18)" : "rgba(255,69,96,0.18)", borderRadius: 3, padding: "1px 5px", minWidth: 18, textAlign: "center" }}>{tx.seq}</span>
                          {tx.type}
                        </span>
                      </td>
                      <td style={{ padding: "8px 12px" }}>
                        <a href={"https://gmgn.ai/sol/token/" + tx.token.address} target="_blank" rel="noopener noreferrer" style={{ fontWeight: 700, fontSize: 13 }}>{tx.token.symbol}</a>
                      </td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12, color: "var(--dim)" }}>{fMc(tx.mc)}</td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12 }}>{fNum(tx.amount)}</td>
                      <td style={{ padding: "8px 12px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          <div style={{ width: 30, height: 4, background: "var(--bg)", borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ width: Math.min(tx.unsoldPct, 100) + "%", height: "100%", background: tx.unsoldPct > 60 ? "var(--amber)" : "var(--dim)", borderRadius: 2 }} />
                          </div>
                          <span className="mono" style={{ fontSize: 11, color: "var(--dim)" }}>{tx.unsoldPct.toFixed(0)}%</span>
                        </div>
                      </td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12 }}>{unit === "USD" ? fUsd(tx.totalUsd) : fSol(tx.totalSol)}</td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12, fontWeight: 600, color: tx.txProfit >= 0 ? "var(--green)" : "var(--red)" }}>{fUsd(tx.txProfit)}</td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12, fontWeight: 600, color: tx.txRoi >= 0 ? "var(--green)" : "var(--red)" }}>{fPct(tx.txRoi)}</td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12, fontWeight: 600, color: tx.txUnrealizedRoi >= 0 ? "var(--green)" : "var(--red)" }}>{fPct(tx.txUnrealizedRoi)}</td>
                      <td className="mono" style={{ padding: "8px 12px", fontSize: 12, color: "var(--dim)" }}>{fAge(tx.timestamp)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ padding: "9px 16px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 11, color: "var(--dim)", fontWeight: 600 }}>{rows.length} transactions</span>
            {!isLive && <span style={{ fontSize: 10, color: "var(--muted)", fontStyle: "italic" }}>Demo data — add GMGN_API_KEY env var for live results</span>}
          </div>
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
